<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация для Димы - РЕДАКТОР</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222; /* Темно-серый фон для редактора */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Убираем полосы прокрутки */
            font-family: sans-serif;
        }

        /* Умный контейнер: всегда держит пропорцию 16:9 и занимает максимум экрана */
        #slide-container {
            position: relative;
            aspect-ratio: 16 / 9;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #000;
        }

        #slide-image {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- СТИЛИ ДЛЯ РЕЖИМА РЕДАКТИРОВАНИЯ --- */
        .edit-box {
            position: absolute;
            resize: both;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            color: white;
            cursor: move;
            z-index: 10;
            box-sizing: border-box;
        }

        #click-zone {
            background: rgba(255, 100, 0, 0.5); /* Неоново-оранжевый для контраста */
            border: 2px dashed #ff6600;
            left: 10%; top: 10%; width: 20%; height: 20%;
        }

        /* Инструкция поверх экрана */
        #instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            border: 1px solid #ff6600;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h3 style="margin-top:0; color: #ff6600;">Режим редактирования</h3>
        <p style="margin-bottom:0;">
           1. <b>Растяните</b> оранжевую зону за правый нижний угол.<br>
           2. <b>Перетащите</b> её на то место, куда нужно кликнуть.<br>
           3. Нажмите <b>Enter</b>, чтобы получить код!
        </p>
    </div>

    <div id="slide-container">
        <img id="slide-image" src="f1.jpg" alt="Слайд 1" onerror="this.src='https://via.placeholder.com/1920x1080?text=Тут+будет+f1.jpg'">

        <div id="click-zone" class="edit-box draggable">
            Переход<br>на f2.html
        </div>
    </div>

    <script>
        let draggedElement = null;
        let offsetX = 0, offsetY = 0;

        document.querySelectorAll('.draggable').forEach(elem => {
            elem.addEventListener('mousedown', (e) => {
                let rect = elem.getBoundingClientRect();
                if (e.clientX > rect.right - 20 && e.clientY > rect.bottom - 20) return;

                draggedElement = elem;
                offsetX = e.clientX - elem.getBoundingClientRect().left;
                offsetY = e.clientY - elem.getBoundingClientRect().top;
                elem.style.cursor = 'grabbing';
            });
        });

        document.addEventListener('mousemove', (e) => {
            if (!draggedElement) return;
            const container = document.getElementById('slide-container').getBoundingClientRect();
            
            let newLeft = e.clientX - container.left - offsetX;
            let newTop = e.clientY - container.top - offsetY;

            draggedElement.style.left = newLeft + 'px';
            draggedElement.style.top = newTop + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (draggedElement) {
                draggedElement.style.cursor = 'move';
                draggedElement = null;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const container = document.getElementById('slide-container');
                const cWidth = container.offsetWidth;
                const cHeight = container.offsetHeight;
                const clickZone = document.getElementById('click-zone');

                const getPercents = (el) => {
                    return {
                        left: ((el.offsetLeft / cWidth) * 100).toFixed(2),
                        top: ((el.offsetTop / cHeight) * 100).toFixed(2),
                        width: ((el.offsetWidth / cWidth) * 100).toFixed(2),
                        height: ((el.offsetHeight / cHeight) * 100).toFixed(2)
                    };
                };

                let cParams = getPercents(clickZone);

                // Теперь генерируется ПОЛНЫЙ код страницы для финального слайда
                let finalHtml = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #slide-container { position: relative; aspect-ratio: 16/9; max-width: 100vw; max-height: 100vh; }
        #slide-container img { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="slide-container">
        <img src="f1.jpg" alt="Слайд 1">
        <a href="f2.html" style="position: absolute; left: ${cParams.left}%; top: ${cParams.top}%; width: ${cParams.width}%; height: ${cParams.height}%; z-index: 10; cursor: pointer;"></a>
    </div>
</body>
</html>`;

                prompt("Готово! Скопируйте весь этот код и сохраните его (например, в файл index.html для показа):", finalHtml);
            }
        });
    </script>
</body>
</html>
