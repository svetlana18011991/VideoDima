<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация для Димы</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ================= БАЗОВЫЕ СТИЛИ ПРЕЗЕНТАЦИИ ================= */
        body { 
            margin: 0; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #presentation-screen { 
            position: relative; 
            aspect-ratio: 16/9; 
            max-width: 100vw; 
            max-height: 100vh; 
            width: 100%;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; 
        }
        
        .slide.active {
            display: block; 
        }

        .slide > img { 
            width: 100%; 
            height: 100%; 
            display: block; 
        }

        .invisible-btn {
            position: absolute;
            z-index: 10;
            cursor: pointer;
        }

        /* Правило, чтобы видео в полноэкранном режиме не искажалось */
        video:fullscreen { object-fit: contain !important; background-color: #000 !important; }
        video:-webkit-full-screen { object-fit: contain !important; background-color: #000 !important; }
        video:-moz-full-screen { object-fit: contain !important; background-color: #000 !important; }


        /* ================= СТИЛИ ДЛЯ ИГРЫ (АДАПТИВНОСТЬ) ================= */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('фон.png');
            background-size: cover;
            background-position: center bottom;
            overflow: hidden;
        }

        #tree-wrapper {
            position: absolute;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%; 
            height: 90%; 
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            pointer-events: none; 
        }

        .tree-img {
            position: absolute;
            max-width: 90%;
            max-height: 100%;
            transition: opacity 1.5s ease-in-out;
            transform-origin: bottom center;
            bottom: 5%; 
        }

        #tree-next { opacity: 0; }

        @keyframes pulseRed {
            0% { filter: none; transform: translateX(-50%) scale(1); }
            50% { filter: sepia(1) hue-rotate(-50deg) saturate(5); transform: translateX(-50%) scale(0.98); }
            100% { filter: none; transform: translateX(-50%) scale(1); }
        }

        .error-anim { animation: pulseRed 1s ease-in-out; }

        #btn-next {
            position: absolute;
            bottom: 2%; 
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 40px;
            font-size: 28px;
            font-family: 'Caveat', cursive; 
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #8bc34a, #558b2f); 
            border: 3px solid #33691e;
            border-radius: 40px; 
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,255,0.4); 
            transition: all 0.3s;
            z-index: 10;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }

        #question-modal {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-image: url('6.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent; 
            padding: 15% 10% 12% 10%; 
            box-sizing: border-box;
            text-align: center;
            display: none;
            z-index: 20;
            width: 95%; 
            max-width: 600px; 
            min-height: 300px; 
        }

        #question-text {
            font-size: 22px; 
            margin-bottom: 25px;
            color: #3e2723; 
            font-weight: bold;
            line-height: 1.3; 
        }

        .answer-btn {
            display: block;
            width: 75%; 
            margin: 10px auto; 
            padding: 12px; 
            font-size: 17px;
            font-weight: bold;
            background: #558b2f; 
            color: white;
            border: 2px solid #33691e; 
            border-radius: 12px; 
            cursor: pointer;
            transition: all 0.3s;
        }

        /* Настройки для мобильных устройств */
        @media screen and (max-width: 600px) {
            #question-modal {
                padding: 60px 40px 40px 40px;
                min-height: 250px;
                top: 50%;
            }
            #question-text {
                font-size: 16px;
                margin-bottom: 10px;
            }
            .answer-btn {
                width: 90%;
                padding: 8px;
                font-size: 14px;
                margin: 5px auto;
            }
            #btn-next {
                font-size: 20px;
                padding: 10px 30px;
            }
        }

        #final-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: none;
            z-index: 30;
        }

        #final-text {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: 60px; 
            color: #f1c40f;
            text-shadow: 2px 2px 0 #d35400, 3px 3px 10px rgba(0,0,0,0.5);
            transform: rotate(-3deg);
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="presentation-screen">
        
        <div id="slide1" class="slide active">
            <img src="f1.jpg" alt="Слайд 1">
            <div class="invisible-btn" onclick="goToSlide(2)" style="left: 42.93%; top: 87.70%; width: 19.98%; height: 20.00%;"></div>
        </div>

        <div id="slide2" class="slide">
            <img src="f2.jpg" alt="Слайд 2">
            <video id="vid1" src="1 (2).mp4" controls style="position: absolute; left: 17.5%; top: 11%; width: 28.5%; height: 69%; z-index: 5; object-fit: cover; border-radius: 4px; background: transparent;"></video>
            <div class="invisible-btn" onclick="goToSlide(3)" style="left: 39%; top: 85%; width: 22%; height: 10%;"></div>
        </div>

        <div id="slide3" class="slide">
            <img src="f3.jpg" alt="Слайд 3">
            <video id="vid2" src="2.mp4" controls style="position: absolute; left: 54%; top: 11%; width: 28.5%; height: 69%; z-index: 5; object-fit: cover; border-radius: 4px; background: transparent;"></video>
            <div class="invisible-btn" onclick="goToSlide(4)" style="left: 39%; top: 85%; width: 22%; height: 10%;"></div>
        </div>

        <div id="slide4" class="slide">
            <img src="f4.jpg" alt="Слайд 4">
            <video id="vid3" src="3.mp4" controls style="position: absolute; left: 17.5%; top: 11%; width: 28.5%; height: 69%; z-index: 5; object-fit: cover; border-radius: 4px; background: transparent;"></video>
            <div class="invisible-btn" onclick="goToSlide(5)" style="left: 39%; top: 85%; width: 22%; height: 10%;"></div>
        </div>

        <div id="slide5" class="slide">
            <img src="f5.jpg" alt="Слайд 5">
            <video id="vid4" src="4.mp4" controls style="position: absolute; left: 54%; top: 11%; width: 28.5%; height: 69%; z-index: 5; object-fit: cover; border-radius: 4px; background: transparent;"></video>
            <div class="invisible-btn" onclick="goToSlide(6)" style="left: 39%; top: 85%; width: 22%; height: 10%;"></div>
        </div>

        <div id="slide6" class="slide">
            <img src="f6.jpg" alt="Слайд 6">
            <div class="invisible-btn" onclick="goToSlide(7)" style="left: 39%; top: 85%; width: 22%; height: 10%;"></div>
        </div>

        <div id="slide7" class="slide">
            <div id="game-container">
                <div id="tree-wrapper">
                    <img id="tree-current" class="tree-img" src="1.png">
                    <img id="tree-next" class="tree-img" src="">
                </div>
                <button id="btn-next">Начать рост!</button>
                <div id="question-modal">
                    <div id="question-text">Вопрос?</div>
                    <div id="answers-container"></div>
                </div>
                <div id="final-screen">
                    <canvas id="fireworks-canvas"></canvas>
                    <div id="final-text"></div> 
                </div>
            </div>
        </div>

    </div>

    <script>
        function goToSlide(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('slide' + n).classList.add('active');
            document.querySelectorAll('video').forEach(v => v.pause());
        }

        const questions = [
            { q: "Что заставляет сосновую шишку закрывать свои чешуйки?", options: ["Холодный ветер", "Повышенная влажность", "Темнота"], correct: 1 },
            { q: "Зачем шишка плотно закрывается перед дождем?", options: ["Чтобы сохранить семена", "Чтобы не замерзнуть", "Чтобы спрятаться"], correct: 0 },
            { q: "Как называется наука, создающая технологии на основе природы?", options: ["Ботаника", "Экология", "Бионика"], correct: 2 },
            { q: "Сколько лет может прожить сосна?", options: ["Около 10 лет", "От 100 до 600 лет", "Больше 1000 лет"], correct: 1 }
        ];

        let currentQuestionIndex = 0, treeStage = 1;
        const btnNext = document.getElementById('btn-next'), modal = document.getElementById('question-modal');
        const qText = document.getElementById('question-text'), aContainer = document.getElementById('answers-container');
        const treeCurrent = document.getElementById('tree-current'), treeNext = document.getElementById('tree-next');

        btnNext.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length) {
                btnNext.style.display = 'none';
                modal.style.display = 'block';
                const q = questions[currentQuestionIndex];
                qText.textContent = q.q;
                aContainer.innerHTML = '';
                q.options.forEach((opt, i) => {
                    const b = document.createElement('button');
                    b.className = 'answer-btn';
                    b.textContent = opt;
                    b.onclick = () => {
                        modal.style.display = 'none';
                        if (i === q.correct) {
                            treeStage++;
                            treeNext.src = treeStage + '.png';
                            treeNext.style.opacity = 1;
                            setTimeout(() => { treeCurrent.src = treeNext.src; treeNext.style.opacity = 0; nextQ(); }, 1500);
                        } else {
                            document.getElementById('tree-wrapper').classList.add('error-anim');
                            setTimeout(() => { document.getElementById('tree-wrapper').classList.remove('error-anim'); nextQ(); }, 1000);
                        }
                    };
                    aContainer.appendChild(b);
                });
            }
        });

        function nextQ() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) btnNext.style.display = 'block';
            else showWin();
        }

        function showWin() {
            const final = document.getElementById('final-text');
            if (treeStage === 5) final.textContent = "Отлично!";
            else final.textContent = "Молодец!";
            document.getElementById('final-screen').style.display = 'block';
            const canvas = document.getElementById('fireworks-canvas'), ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({ x: canvas.width/2, y: canvas.height/2, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, color: `hsl(${Math.random()*360},100%,50%)`, life: 1 });
            }
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill();
                    if (p.life <= 0) particles.splice(i, 1);
                });
                if (particles.length) requestAnimationFrame(anim);
            }
            anim();
        }
    </script>
</body>
</html>
