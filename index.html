<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация для Димы</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        /* Контейнер для слайда */
        #slide-container {
            position: relative;
            width: 1000px;
            max-width: 100%;
            background-color: #000;
        }

        #slide-image {
            width: 100%;
            display: block;
        }

        /* --- СТИЛИ ДЛЯ РЕЖИМА РЕДАКТИРОВАНИЯ --- */
        .edit-box {
            position: absolute;
            resize: both; /* Растягивание за правый нижний угол */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            cursor: move;
            z-index: 10;
            box-sizing: border-box;
        }

        #click-zone {
            background: rgba(255, 0, 0, 0.4);
            border: 2px dashed red;
            left: 50px; top: 50px; width: 200px; height: 100px;
        }

        /* Инструкция поверх экрана */
        #instructions {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h3>Режим редактирования</h3>
        <p>1. <b>Растяните</b> красную зону за правый нижний угол.<br>
           2. <b>Перетащите</b> её на то место, куда нужно кликнуть.<br>
           3. Нажмите <b>Enter</b>, чтобы получить готовый код!</p>
    </div>

    <div id="slide-container">
        <img id="slide-image" src="f1.jpg" alt="Слайд 1" onerror="this.src='https://via.placeholder.com/1000x562?text=Тут+будет+f1.jpg'">

        <div id="click-zone" class="edit-box draggable">
            Зона перехода<br>на f2.html<br>(Тяни за угол)
        </div>
    </div>

    <script>
        // Скрипт для перетаскивания
        let draggedElement = null;
        let offsetX = 0, offsetY = 0;

        document.querySelectorAll('.draggable').forEach(elem => {
            elem.addEventListener('mousedown', (e) => {
                // Если кликнули в правый нижний угол (зона растягивания), не перетаскиваем
                let rect = elem.getBoundingClientRect();
                if (e.clientX > rect.right - 20 && e.clientY > rect.bottom - 20) return;

                draggedElement = elem;
                offsetX = e.clientX - elem.getBoundingClientRect().left;
                offsetY = e.clientY - elem.getBoundingClientRect().top;
                elem.style.cursor = 'grabbing';
            });
        });

        document.addEventListener('mousemove', (e) => {
            if (!draggedElement) return;
            const container = document.getElementById('slide-container').getBoundingClientRect();
            
            // Вычисляем новые координаты
            let newLeft = e.clientX - container.left - offsetX;
            let newTop = e.clientY - container.top - offsetY;

            draggedElement.style.left = newLeft + 'px';
            draggedElement.style.top = newTop + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (draggedElement) {
                draggedElement.style.cursor = 'move';
                draggedElement = null;
            }
        });

        // Слушаем нажатие Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const container = document.getElementById('slide-container');
                const cWidth = container.offsetWidth;
                const cHeight = container.offsetHeight;

                const clickZone = document.getElementById('click-zone');

                // Переводим пиксели в проценты для адаптивности
                const getPercents = (el) => {
                    return {
                        left: ((el.offsetLeft / cWidth) * 100).toFixed(2),
                        top: ((el.offsetTop / cHeight) * 100).toFixed(2),
                        width: ((el.offsetWidth / cWidth) * 100).toFixed(2),
                        height: ((el.offsetHeight / cHeight) * 100).toFixed(2)
                    };
                };

                let cParams = getPercents(clickZone);

                let finalHtml = `<div style="position: relative; width: 100%; max-width: 1000px;">
    <img src="f1.jpg" style="width: 100%; display: block;">
    
    <a href="f2.html" style="position: absolute; left: ${cParams.left}%; top: ${cParams.top}%; width: ${cParams.width}%; height: ${cParams.height}%; z-index: 10; cursor: pointer;"></a>
</div>`;

                prompt("Готово! Скопируйте этот код для финальной версии вашего первого слайда:", finalHtml);
            }
        });
    </script>
</body>
</html>
